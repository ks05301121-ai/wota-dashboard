<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント情報Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root{--bg:#0D0D1A;--card:#1A1A2E;--pink:#FF2D78;--mint:#00F5D4;--gold:#FFD700;--purple:#9B59B6;--text:#E8E8F0;--muted:#6B6B8A;--border:#2A2A4A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,45,120,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,245,212,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:16px;font-weight:900;}.logo span:first-child{color:var(--pink);}.logo span:last-child{color:var(--mint);}
  .header-right{display:flex;align-items:center;gap:6px;}
  .save-btn{background:rgba(0,245,212,.1);color:var(--mint);border:1px solid rgba(0,245,212,.3);padding:7px 10px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
  .add-btn{background:var(--pink);color:#fff;border:none;padding:7px 12px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
  .today-badge{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border);padding:3px 6px;border-radius:4px;}

  /* REMINDER BANNER */
  .reminder-banner{display:none;position:sticky;top:60px;z-index:99;background:linear-gradient(90deg,rgba(255,45,120,.9),rgba(155,89,182,.9));padding:10px 16px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;}
  .reminder-banner.show{display:block;}

  /* VIEW TABS */
  .view-tabs{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px;margin:16px 14px 0;}
  .view-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:5px;transition:all .15s;}
  .view-tab.active{background:var(--pink);color:#fff;}

  main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .col-span-2{grid-column:span 2;}
  .section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* STATS */
  .stats-row{grid-column:span 2;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:transform .15s;}
  .stat-card.clickable{cursor:pointer;}.stat-card.clickable:hover{transform:translateY(-2px);}
  .stat-card.editable{cursor:pointer;}
  .stat-num{font-family:'Share Tech Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;}
  .stat-num.pink{color:var(--pink);}.stat-num.mint{color:var(--mint);}.stat-num.gold{color:var(--gold);}.stat-num.purple{color:#C77DFF;}
  .stat-label{font-size:10px;color:var(--muted);}
  .budget-input{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;color:#C77DFF;background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;width:100%;text-align:center;-webkit-appearance:none;}

  /* TICKET CARD */
  .ticket-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;transition:box-shadow .2s;}
  .ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pink),var(--purple));}
  .ticket-card.drag-over{border-color:var(--mint);box-shadow:0 0 12px rgba(0,245,212,.3);}
  .ticket-card.dragging{opacity:.5;}
  .ticket-inner{padding:16px;}
  .card-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .event-category{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:3px;}
  .cat-live{background:rgba(255,45,120,.2);color:var(--pink);border:1px solid rgba(255,45,120,.4);}
  .cat-anime{background:rgba(0,245,212,.15);color:var(--mint);border:1px solid rgba(0,245,212,.3);}
  .cat-game{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
  .card-btn-group{display:flex;gap:2px;align-items:center;}
  .drag-handle{color:var(--muted);font-size:14px;cursor:grab;padding:2px 4px;touch-action:none;}
  .delete-btn{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1;}
  .delete-btn:hover{color:var(--pink);}
  .edit-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1;}
  .edit-btn:hover{color:var(--mint);}
  .event-title{font-size:16px;font-weight:900;line-height:1.3;margin-bottom:4px;}
  .event-artist{font-size:11px;color:var(--muted);margin-bottom:10px;}
  .ticket-link-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:5px;border:1px solid;cursor:pointer;text-decoration:none;transition:background .15s;margin-bottom:10px;}
  .tl-eplus{color:#00B4D8;border-color:rgba(0,180,216,.4);background:rgba(0,180,216,.08);}
  .tl-lawson{color:#F39800;border-color:rgba(243,152,0,.4);background:rgba(243,152,0,.08);}
  .tl-tpia{color:#C77DFF;border-color:rgba(199,125,255,.4);background:rgba(199,125,255,.08);}
  .tl-tiget{color:#FF6B6B;border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08);}
  .tl-ticketdive{color:#4ECDC4;border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.08);}
  .tl-livepocket{color:#A8E6CF;border-color:rgba(168,230,207,.4);background:rgba(168,230,207,.08);}
  .tl-custom{color:var(--mint);border-color:rgba(0,245,212,.3);background:rgba(0,245,212,.06);}
  .perfo{border:none;border-top:2px dashed var(--border);margin:0 -16px 14px;position:relative;}
  .perfo::before,.perfo::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:14px;height:14px;background:var(--bg);border-radius:50%;border:1px solid var(--border);}
  .perfo::before{left:-7px;}.perfo::after{right:-7px;}
  .ticket-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .meta-item label{display:block;font-size:10px;color:var(--muted);margin-bottom:2px;}
  .meta-item .val{font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
  .meta-item .val.urgent{color:var(--pink);}.meta-item .val.soon{color:var(--gold);}.meta-item .val.ok{color:var(--mint);}
  .countdown-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;margin-top:10px;}
  .countdown-pill.urgent{background:rgba(255,45,120,.15);color:var(--pink);border:1px solid rgba(255,45,120,.3);}
  .countdown-pill.warn{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
  .countdown-pill.safe{background:rgba(0,245,212,.1);color:var(--mint);border:1px solid rgba(0,245,212,.2);}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  /* CARD SECTIONS */
  .card-section{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
  .card-section-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
  .card-route-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:8px;}
  .card-route-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:11px;outline:none;width:100%;}
  .card-route-input:focus{border-color:var(--gold);}
  .card-route-input::placeholder{color:var(--muted);}
  .card-route-arrow{color:var(--muted);font-size:14px;text-align:center;}
  .card-route-btn{width:100%;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.35);color:var(--gold);padding:7px;border-radius:5px;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;margin-bottom:6px;}

  /* TIMETABLE */
  .card-tl-list{display:flex;flex-direction:column;}
  .card-tl-item{display:grid;grid-template-columns:46px 1fr auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
  .card-tl-item:last-child{border-bottom:none;}
  .card-tl-time{font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--mint);}
  .card-tl-name{font-size:12px;font-weight:700;}
  .card-tl-detail{font-size:10px;color:var(--muted);}
  .card-tl-delete{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:3px;flex-shrink:0;}
  .card-tl-delete:hover{color:var(--pink);}
  .card-tl-add{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .card-tl-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;padding:5px 7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:11px;outline:none;flex:1;min-width:60px;}
  .card-tl-input:focus{border-color:var(--mint);}
  .card-tl-input::placeholder{color:var(--muted);}
  .card-tl-input.time-inp{width:68px;flex:none;}
  .card-tl-addbtn{background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.3);color:var(--mint);padding:5px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}

  /* SETLIST */
  .setlist-textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:11px;outline:none;resize:vertical;min-height:80px;margin-top:6px;}
  .setlist-textarea:focus{border-color:var(--mint);}
  .setlist-textarea::placeholder{color:var(--muted);}
  .setlist-save-btn{margin-top:6px;background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.3);color:var(--mint);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

  /* UPCOMING */
  .upcoming-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
  .upcoming-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--pink));}
  .upcoming-list{display:flex;flex-direction:column;gap:7px;}
  .upcoming-item{display:grid;grid-template-columns:42px 1fr auto auto;align-items:center;gap:8px;padding:9px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s;}
  .upcoming-item:hover{border-color:var(--pink);}
  .upcoming-date-box{text-align:center;background:rgba(255,45,120,.1);border:1px solid rgba(255,45,120,.2);border-radius:5px;padding:3px;}
  .upcoming-date-box .month{font-size:8px;font-weight:700;color:var(--pink);letter-spacing:1px;display:block;}
  .upcoming-date-box .day{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700;color:var(--text);line-height:1;display:block;}
  .upcoming-date-box.ticket-day{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.2);}
  .upcoming-date-box.ticket-day .month{color:var(--gold);}
  .upcoming-info .title{font-size:12px;font-weight:700;margin-bottom:1px;}
  .upcoming-info .sub{font-size:10px;color:var(--muted);}
  .upcoming-days-left{text-align:right;}
  .upcoming-days-left .num{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700;color:var(--pink);line-height:1;}
  .upcoming-days-left .label{font-size:9px;color:var(--muted);display:block;}
  .upcoming-days-left.safe .num{color:var(--mint);}.upcoming-days-left.warn .num{color:var(--gold);}
  .upcoming-delete-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 5px;border-radius:4px;}
  .upcoming-delete-btn:hover{color:var(--pink);}

  /* CALENDAR VIEW */
  .cal-view{display:none;}
  .cal-view.active{display:block;}
  .list-view{display:contents;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav{background:none;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:14px;}
  .cal-month-label{font-size:15px;font-weight:900;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-dow{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0;}
  .cal-day{min-height:48px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:4px;font-size:10px;position:relative;cursor:default;}
  .cal-day.other-month{opacity:.3;}
  .cal-day.today{border-color:var(--mint);}
  .cal-day-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px;}
  .cal-day.today .cal-day-num{color:var(--mint);font-weight:700;}
  .cal-event-dot{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 3px;border-radius:2px;margin-bottom:1px;cursor:pointer;}
  .cal-event-dot.live{background:rgba(255,45,120,.25);color:var(--pink);}
  .cal-event-dot.anime{background:rgba(0,245,212,.15);color:var(--mint);}
  .cal-event-dot.game{background:rgba(255,215,0,.15);color:var(--gold);}
  .cal-event-dot.ticket{background:rgba(255,215,0,.1);color:var(--gold);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
  .modal-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-title{font-size:15px;font-weight:900;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
  .form-row{display:flex;flex-direction:column;gap:5px;}
  .form-row label{font-size:11px;font-weight:700;color:var(--muted);}
  .form-input{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:8px 11px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .2s;}
  .form-input:focus{border-color:var(--pink);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cat-select{display:flex;gap:6px;}
  .cat-btn{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
  .cat-btn.active-live{border-color:var(--pink);background:rgba(255,45,120,.15);color:var(--pink);}
  .cat-btn.active-anime{border-color:var(--mint);background:rgba(0,245,212,.1);color:var(--mint);}
  .cat-btn.active-game{border-color:var(--gold);background:rgba(255,215,0,.1);color:var(--gold);}
  .site-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .site-btn{padding:7px 6px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
  .site-btn.active{border-color:var(--mint);background:rgba(0,245,212,.1);color:var(--mint);}
  .modal-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;}
  .btn-save{background:var(--pink);border:none;color:#fff;padding:8px 18px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

  /* CONFIRM */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);z-index:250;display:none;align-items:center;justify-content:center;}
  .confirm-overlay.open{display:flex;}
  .confirm-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:320px;width:100%;margin:20px;text-align:center;}
  .confirm-icon{font-size:30px;margin-bottom:10px;}
  .confirm-title{font-size:14px;font-weight:900;margin-bottom:5px;}
  .confirm-sub{font-size:11px;color:var(--muted);margin-bottom:18px;}
  .confirm-btns{display:flex;gap:8px;justify-content:center;}
  .confirm-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;}
  .confirm-ok{background:var(--pink);border:none;color:#fff;padding:8px 18px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:300;transition:transform .3s,opacity .3s;opacity:0;box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.success{border-color:rgba(0,245,212,.4);color:var(--mint);}
  .toast.error{border-color:rgba(255,45,120,.4);color:var(--pink);}

  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  @media(max-width:600px){main{grid-template-columns:1fr;gap:12px;padding:12px;}.col-span-2{grid-column:span 1;}.stats-row{grid-column:span 1;grid-template-columns:1fr 1fr;}.form-row-2{grid-template-columns:1fr;}.today-badge{display:none;}}
</style>
</head>
<body>

<header>
  <div class="logo"><span>イベント情報</span><span>Dashboard</span></div>
  <div class="header-right">
    <div class="today-badge" id="today-badge"></div>
    <button class="save-btn" onclick="saveToFile()">💾 保存</button>
    <button class="add-btn" onclick="openModal()">＋ 追加</button>
  </div>
</header>

<div class="reminder-banner" id="reminder-banner" onclick="dismissReminder()"></div>

<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('list',this)">📋 リスト</button>
  <button class="view-tab" onclick="switchView('calendar',this)">📅 カレンダー</button>
</div>

<main>
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card clickable" onclick="scrollToSection('tickets-area')" title="クリックでイベント情報へ">
      <div class="stat-num pink" id="stat-events">0</div><div class="stat-label">登録イベント 👆</div>
    </div>
    <div class="stat-card"><div class="stat-num gold" id="stat-tickets">0</div><div class="stat-label">チケット待ち</div></div>
    <div class="stat-card clickable" id="nearest-card" onclick="scrollToNearest()" title="クリックで該当イベントへ">
      <div class="stat-num mint" id="stat-nearest">—</div><div class="stat-label">次のイベントまで（日）👆</div>
    </div>
    <div class="stat-card editable" id="budget-card" onclick="editBudget()">
      <div class="stat-num purple" id="stat-budget">¥8,800</div><div class="stat-label">今月の推し活予算 ✏️</div>
    </div>
  </div>

  <!-- LIST VIEW -->

<div class="toast" id="toast"></div>

<script>
const nowDate=new Date();
document.getElementById('today-badge').textContent=nowDate.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

let events=[],currentCategory='live',currentSite=null,deleteTargetId=null;
let calYear=nowDate.getFullYear(),calMonth=nowDate.getMonth();
let dragSrcId=null;

const SITE_CONFIG={
  eplus:{label:'e+',cls:'tl-eplus',url:'https://eplus.jp'},
  lawson:{label:'ローチケ',cls:'tl-lawson',url:'https://l-tike.com'},
  tpia:{label:'チケぴ',cls:'tl-tpia',url:'https://ticket.pia.jp'},
  tiget:{label:'Tiget',cls:'tl-tiget',url:'https://tiget.net'},
  ticketdive:{label:'TicketDive',cls:'tl-ticketdive',url:'https://ticketdive.com'},
  livepocket:{label:'LivePocket',cls:'tl-livepocket',url:'https://t.livepocket.jp'},
};
const CAT_LABELS={live:'LIVE',anime:'ANISONG',game:'GAME'};
const CAT_CLS={live:'cat-live',anime:'cat-anime',game:'cat-game'};
const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const JPMONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// STORAGE
function persist(){try{localStorage.setItem('ev_events',JSON.stringify(events));}catch(e){}}
function loadFromStorage(){try{const r=localStorage.getItem('ev_events');if(r){events=JSON.parse(r);renderAll();}}catch(e){}}
function saveToFile(){
  const blob=new Blob([JSON.stringify({savedAt:new Date().toISOString(),events},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  const d=nowDate;
  a.href=url;a.download=`ev_dashboard_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);showToast('💾 保存しました！','success');
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDT(dt){if(!dt)return'未設定';const d=new Date(dt);return`${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;}
function daysUntil(s){if(!s)return null;return Math.ceil((new Date(s)-nowDate)/86400000);}

// SORT BY EVENT DATE
function sortEvents(){
  events.sort((a,b)=>{
    const da=a.eventDate?new Date(a.eventDate):new Date('9999-12-31');
    const db=b.eventDate?new Date(b.eventDate):new Date('9999-12-31');
    return da-db;
  });
}

function renderAll(){renderTickets();renderUpcoming();updateStats();renderCalendar();checkReminders();}

// SCROLL HELPERS
function scrollToSection(id){
  const el=document.getElementById(id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function scrollToNearest(){
  const future=events.filter(ev=>ev.eventDate&&daysUntil(ev.eventDate)>=0).sort((a,b)=>daysUntil(a.eventDate)-daysUntil(b.eventDate));
  if(future.length===0)return;
  const id=future[0].id;
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 16px rgba(0,245,212,.5)';setTimeout(()=>el.style.boxShadow='',1500);}
}
function scrollToEvent(id){
  // Switch to list view first
  switchView('list',document.querySelector('.view-tab'));
  setTimeout(()=>{
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 16px rgba(255,45,120,.5)';setTimeout(()=>el.style.boxShadow='',1500);}
  },100);
}

// ROUTE & TIMETABLE HTML
function buildRouteHtml(ev,idx){
  if(!ev.departure)return'';
  const depEnc=encodeURIComponent(ev.departure),venueEnc=encodeURIComponent(ev.venue||'');
  return`<div class="card-section">
    <div class="card-section-label">🚃 会場までのルート</div>
    <div class="card-route-inputs">
      <input class="card-route-input" value="${escHtml(ev.departure)}" id="dep-${idx}" placeholder="出発地">
      <div class="card-route-arrow">→</div>
      <input class="card-route-input" value="${escHtml(ev.venue||'')}" id="arr-${idx}" placeholder="会場">
    </div>
    <button class="card-route-btn" onclick="openRoute('${idx}')">🔍 乗換案内を開く</button>
    <div style="font-size:10px;"><a href="https://transit.yahoo.co.jp/search/print?from=${depEnc}&to=${venueEnc}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;">📱 Yahoo!乗換案内で開く →</a></div>
  </div>`;
}

function buildTimetableHtml(ev){
  const tl=ev.timetable||[];
  const rows=tl.map((t,i)=>`
    <div class="card-tl-item">
      <div class="card-tl-time">${escHtml(t.time)}</div>
      <div><div class="card-tl-name">${escHtml(t.name)}</div>${t.detail?`<div class="card-tl-detail">${escHtml(t.detail)}</div>`:''}</div>
      <button class="card-tl-delete" onclick="deleteTlItem('${ev.id}',${i})">✕</button>
    </div>`).join('');
  return`<div class="card-section">
    <div class="card-section-label">📋 タイムテーブル</div>
    <div class="card-tl-list">${rows||'<div style="font-size:11px;color:var(--muted);padding:4px 0;">まだ追加されていません</div>'}</div>
    <div class="card-tl-add">
      <input class="card-tl-input time-inp" type="text" id="tl-time-${ev.id}" placeholder="18:30" maxlength="5">
      <input class="card-tl-input" type="text" id="tl-name-${ev.id}" placeholder="アーティスト名">
      <button class="card-tl-addbtn" onclick="addTlItem('${ev.id}')">＋</button>
    </div>
  </div>`;
}

function buildSetlistHtml(ev){
  const sl=ev.setlist||'';
  return`<div class="card-section">
    <div class="card-section-label">🎵 セットリスト</div>
    <textarea class="setlist-textarea" id="sl-${ev.id}" placeholder="曲名を入力&#10;（例）&#10;1. 君と歩いた道&#10;2. Summer Rain">${escHtml(sl)}</textarea>
    <button class="setlist-save-btn" onclick="saveSetlist('${ev.id}')">保存</button>
  </div>`;
}

function openRoute(idx){
  const dep=document.getElementById(`dep-${idx}`).value;
  const arr=document.getElementById(`arr-${idx}`).value;
  if(!dep||!arr)return;
  window.open(`https://transit.yahoo.co.jp/search/print?from=${encodeURIComponent(dep)}&to=${encodeURIComponent(arr)}`,'_blank');
}

function addTlItem(evId){
  const timeEl=document.getElementById(`tl-time-${evId}`);
  const nameEl=document.getElementById(`tl-name-${evId}`);
  const time=timeEl.value.trim(),name=nameEl.value.trim();
  if(!time||!name){showToast('⚠️ 時間とアーティスト名を入力してください','error');return;}
  const idx=events.findIndex(e=>e.id===evId);if(idx===-1)return;
  if(!events[idx].timetable)events[idx].timetable=[];
  events[idx].timetable.push({time,name,detail:''});
  events[idx].timetable.sort((a,b)=>a.time.localeCompare(b.time));
  persist();renderAll();
}

function deleteTlItem(evId,tlIdx){
  const idx=events.findIndex(e=>e.id===evId);if(idx===-1)return;
  events[idx].timetable.splice(tlIdx,1);persist();renderAll();
}

function saveSetlist(evId){
  const ta=document.getElementById(`sl-${evId}`);if(!ta)return;
  const idx=events.findIndex(e=>e.id===evId);if(idx===-1)return;
  events[idx].setlist=ta.value;persist();showToast('✅ セットリストを保存しました','success');
}

// DRAG & DROP (touch + mouse)
function setupDrag(card,evId){
  card.setAttribute('draggable','true');
  card.addEventListener('dragstart',e=>{dragSrcId=evId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.ticket-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(dragSrcId===evId)return;
    const srcIdx=events.findIndex(ev=>ev.id===dragSrcId);
    const dstIdx=events.findIndex(ev=>ev.id===evId);
    if(srcIdx===-1||dstIdx===-1)return;
    const [moved]=events.splice(srcIdx,1);events.splice(dstIdx,0,moved);
    persist();renderAll();
  });
}

function renderTickets(){
  const list=document.getElementById('tickets-list');
  const empty=document.getElementById('tickets-empty');
  list.innerHTML='';
  if(events.length===0){list.appendChild(empty);return;}
  events.forEach((ev,idx)=>{
    const dT=daysUntil(ev.ticketDate),dE=daysUntil(ev.eventDate);
    const pillClass=dT!==null&&dT>=0&&dT<14?'urgent':dE!==null&&dE>=0&&dE<30?'warn':'safe';
    const pillText=dT!==null&&dT>=0?`チケット発売まで ${dT}日`:dE!==null&&dE>=0?`イベントまで ${dE}日`:dE!==null&&dE<0?'終了済み':'日程未設定';
    const tValCls=dT!==null&&dT<14&&dT>=0?'urgent':dT!==null&&dT<0?'ok':'';
    const tValTxt=dT===null?'未設定':dT<0?'発売中':formatDT(ev.ticketDate);
    let linkHtml='';
    if(ev.ticketSite&&SITE_CONFIG[ev.ticketSite]){
      const cfg=SITE_CONFIG[ev.ticketSite];
      linkHtml=`<a class="ticket-link-btn ${cfg.cls}" href="${escHtml(ev.ticketUrl||cfg.url)}" target="_blank" rel="noopener">🎟 ${cfg.label}で購入</a>`;
    }else if(ev.ticketUrl){
      linkHtml=`<a class="ticket-link-btn tl-custom" href="${escHtml(ev.ticketUrl)}" target="_blank" rel="noopener">🎟 チケット購入</a>`;
    }
    const card=document.createElement('div');
    card.className='ticket-card';card.dataset.id=ev.id;
    card.innerHTML=`<div class="ticket-inner">
      <div class="card-top-row">
        <span class="event-category ${CAT_CLS[ev.category]}">${CAT_LABELS[ev.category]}</span>
        <div class="card-btn-group">
          <span class="drag-handle" title="ドラッグで並び替え">⠿</span>
          <button class="edit-btn" onclick="openEditModal('${ev.id}')">✏️</button>
          <button class="delete-btn" onclick="confirmDelete('${ev.id}')">✕</button>
        </div>
      </div>
      <div class="event-title">${escHtml(ev.title)}</div>
      <div class="event-artist">${escHtml(ev.artist||'—')} / ${escHtml(ev.venue||'—')}</div>
      ${linkHtml}
      <div class="perfo"></div>
      <div class="ticket-meta">
        <div class="meta-item"><label>🎫 チケット発売</label><div class="val ${tValCls}">${tValTxt}</div></div>
        <div class="meta-item"><label>📍 会場</label><div class="val">${escHtml(ev.venue||'—')}</div></div>
        <div class="meta-item"><label>📅 イベント日</label><div class="val">${formatDT(ev.eventDate)}</div></div>
        <div class="meta-item"><label>💺 座席 / メモ</label><div class="val ${ev.memo?'ok':'soon'}">${ev.memo?escHtml(ev.memo):'未取得'}</div></div>
      </div>
      <div class="countdown-pill ${pillClass}"><span class="pulse-dot"></span>${pillText}</div>
      ${buildTimetableHtml(ev)}
      ${buildSetlistHtml(ev)}
      ${buildRouteHtml(ev,idx)}
    </div>`;
    setupDrag(card,ev.id);
    list.appendChild(card);
  });
}

function renderUpcoming(){
  const list=document.getElementById('upcoming-list');
  const empty=document.getElementById('upcoming-empty');
  list.innerHTML='';
  if(events.length===0){list.appendChild(empty);return;}
  const rows=[];
  events.forEach(ev=>{
    if(ev.ticketDate)rows.push({date:ev.ticketDate,label:`🎫 チケット発売 — ${ev.title}`,sub:`${formatDT(ev.ticketDate)}〜 / ${ev.venue||''}`,isTicket:true,id:ev.id});
    if(ev.eventDate)rows.push({date:ev.eventDate,label:`🎤 ${ev.title}`,sub:`${formatDT(ev.eventDate)}〜 / ${ev.venue||''}`,isTicket:false,id:ev.id});
  });
  rows.sort((a,b)=>new Date(a.date)-new Date(b.date));
  rows.forEach(row=>{
    const d=new Date(row.date),days=Math.ceil((d-nowDate)/86400000);
    const dClass=days<14?'':days<30?'warn':'safe';
    const item=document.createElement('div');item.className='upcoming-item';
    item.onclick=(e)=>{if(!e.target.classList.contains('upcoming-delete-btn'))scrollToEvent(row.id);};
    item.innerHTML=`
      <div class="upcoming-date-box ${row.isTicket?'ticket-day':''}">
        <span class="month">${MONTHS[d.getMonth()]}</span><span class="day">${d.getDate()}</span>
      </div>
      <div class="upcoming-info"><div class="title">${escHtml(row.label)}</div><div class="sub">${escHtml(row.sub)}</div></div>
      <div class="upcoming-days-left ${dClass}"><span class="num">${days<0?'—':days}</span><span class="label">${days<0?'終了':'日後'}</span></div>
      <button class="upcoming-delete-btn" onclick="confirmDelete('${row.id}')">✕</button>`;
    list.appendChild(item);
  });
}

function updateStats(){
  document.getElementById('stat-events').textContent=events.length;
  document.getElementById('stat-tickets').textContent=events.filter(ev=>{const d=daysUntil(ev.ticketDate);return d!==null&&d>=0;}).length;
  const nearest=events.filter(ev=>ev.eventDate&&daysUntil(ev.eventDate)>=0).map(ev=>daysUntil(ev.eventDate)).sort((a,b)=>a-b)[0];
  document.getElementById('stat-nearest').textContent=nearest!==undefined?nearest:'—';
}

// CALENDAR
function renderCalendar(){
  const label=document.getElementById('cal-month-label');
  const grid=document.getElementById('cal-grid');
  label.textContent=`${calYear}年 ${JPMONTHS[calMonth]}`;
  grid.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach(d=>{
    const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDow=first.getDay();
  // prev month fill
  for(let i=0;i<startDow;i++){
    const d=new Date(calYear,calMonth,-(startDow-1-i));
    grid.appendChild(makeCalDay(d,true));
  }
  for(let d=1;d<=last.getDate();d++){
    grid.appendChild(makeCalDay(new Date(calYear,calMonth,d),false));
  }
  // next month fill
  const total=startDow+last.getDate();
  const remaining=(7-total%7)%7;
  for(let i=1;i<=remaining;i++){grid.appendChild(makeCalDay(new Date(calYear,calMonth+1,i),true));}
}

function makeCalDay(date,otherMonth){
  const el=document.createElement('div');
  el.className='cal-day'+(otherMonth?' other-month':'');
  const isToday=date.toDateString()===nowDate.toDateString();
  if(isToday)el.classList.add('today');
  const numEl=document.createElement('div');numEl.className='cal-day-num';numEl.textContent=date.getDate();el.appendChild(numEl);
  const dateStr=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  events.forEach(ev=>{
    if(ev.ticketDate&&ev.ticketDate.startsWith(dateStr)){
      const dot=document.createElement('div');dot.className='cal-event-dot ticket';dot.textContent='🎫 '+ev.title;
      dot.onclick=()=>scrollToEvent(ev.id);el.appendChild(dot);
    }
    if(ev.eventDate&&ev.eventDate.startsWith(dateStr)){
      const dot=document.createElement('div');dot.className=`cal-event-dot ${ev.category}`;dot.textContent='🎤 '+ev.title;
      dot.onclick=()=>scrollToEvent(ev.id);el.appendChild(dot);
    }
  });
  return el;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

// VIEW SWITCH
function switchView(view,btn){
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('list-view-wrap').style.display=view==='list'?'':'none';
  document.getElementById('cal-view-wrap').style.display=view==='calendar'?'':'none';
  if(view==='calendar')renderCalendar();
}

// REMINDER (check every minute)
let reminderDismissed={};
function checkReminders(){
  const now=new Date();
  let msg=null,targetId=null;
  events.forEach(ev=>{
    if(ev.ticketDate&&!reminderDismissed[ev.id+'_ticket']){
      const diff=(new Date(ev.ticketDate)-now)/60000;
      if(diff>0&&diff<=60){msg=`🔔 「${ev.title}」のチケット発売まで約${Math.ceil(diff)}分！`;targetId=ev.id+'_ticket';}
    }
    if(ev.eventDate&&!reminderDismissed[ev.id+'_event']){
      const diff=(new Date(ev.eventDate)-now)/60000;
      if(diff>0&&diff<=60){msg=`🔔 「${ev.title}」まで約${Math.ceil(diff)}分！`;targetId=ev.id+'_event';}
    }
  });
  const banner=document.getElementById('reminder-banner');
  if(msg&&targetId){banner.textContent=msg+' （タップで閉じる）';banner.classList.add('show');banner.dataset.targetId=targetId;}
  else{banner.classList.remove('show');}
}
function dismissReminder(){
  const banner=document.getElementById('reminder-banner');
  if(banner.dataset.targetId)reminderDismissed[banner.dataset.targetId]=true;
  banner.classList.remove('show');
}
setInterval(checkReminders,60000);

// MODAL
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOnBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function setCategory(cat,btn){currentCategory=cat;document.querySelectorAll('#modal-overlay .cat-btn').forEach(b=>b.className='cat-btn');btn.classList.add('active-'+cat);}
function setSite(site,btn){currentSite=site;document.querySelectorAll('#modal-overlay .site-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('custom-url-row').style.display=site==='custom'?'flex':'none';}

function saveEvent(){
  const title=document.getElementById('new-title').value.trim();
  if(!title){showToast('⚠️ イベント名を入力してください','error');return;}
  const ev={
    id:Date.now().toString(),category:currentCategory,title,
    artist:document.getElementById('new-artist').value.trim(),
    venue:document.getElementById('new-venue').value.trim(),
    ticketDate:document.getElementById('new-ticket-date').value,
    eventDate:document.getElementById('new-event-date').value,
    ticketSite:currentSite,
    ticketUrl:document.getElementById('new-ticket-url').value.trim(),
    memo:document.getElementById('new-memo').value.trim(),
    departure:document.getElementById('new-departure').value.trim(),
    timetable:[],setlist:'',
  };
  events.push(ev);
  sortEvents();
  persist();renderAll();
  ['new-title','new-artist','new-venue','new-ticket-date','new-event-date','new-ticket-url','new-memo','new-departure'].forEach(id=>document.getElementById(id).value='');
  currentSite=null;document.querySelectorAll('#modal-overlay .site-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('custom-url-row').style.display='none';
  setCategory('live',document.querySelector('#modal-overlay .cat-btn'));
  closeModal();showToast('✅ イベントを追加しました！','success');
}

// EDIT
let editTargetId=null,editCategory='live',editSite=null;
function openEditModal(id){
  editTargetId=id;
  const ev=events.find(e=>e.id===id);if(!ev)return;
  editCategory=ev.category;
  document.getElementById('edit-title').value=ev.title||'';
  document.getElementById('edit-artist').value=ev.artist||'';
  document.getElementById('edit-venue').value=ev.venue||'';
  document.getElementById('edit-ticket-date').value=ev.ticketDate||'';
  document.getElementById('edit-event-date').value=ev.eventDate||'';
  document.getElementById('edit-ticket-url').value=ev.ticketUrl||'';
  document.getElementById('edit-memo').value=ev.memo||'';
  document.getElementById('edit-departure').value=ev.departure||'';
  ['live','anime','game'].forEach(c=>{const b=document.getElementById(`edit-cat-${c}`);b.className='cat-btn'+(c===ev.category?` active-${c}`:'');});
  editSite=ev.ticketSite||null;
  document.querySelectorAll('#edit-site-grid .site-btn').forEach(b=>b.classList.remove('active'));
  if(editSite){const siteNames={eplus:'e+',lawson:'ローチケ',tpia:'チケぴ',tiget:'Tiget',ticketdive:'TicketDive',livepocket:'LivePocket'};document.querySelectorAll('#edit-site-grid .site-btn').forEach(b=>{if(b.textContent===siteNames[editSite])b.classList.add('active');});}
  document.getElementById('edit-custom-url-row').style.display=editSite==='custom'?'flex':'none';
  document.getElementById('edit-modal-overlay').classList.add('open');
}
function closeEditModal(){document.getElementById('edit-modal-overlay').classList.remove('open');editTargetId=null;}
function closeEditModalOnBg(e){if(e.target===document.getElementById('edit-modal-overlay'))closeEditModal();}
function setEditCategory(cat,btn){editCategory=cat;['live','anime','game'].forEach(c=>{document.getElementById(`edit-cat-${c}`).className='cat-btn';});btn.classList.add('active-'+cat);}
function setEditSite(site,btn){editSite=site;document.querySelectorAll('#edit-site-grid .site-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('edit-custom-url-row').style.display=site==='custom'?'flex':'none';}
function saveEdit(){
  const title=document.getElementById('edit-title').value.trim();
  if(!title){showToast('⚠️ イベント名を入力してください','error');return;}
  const idx=events.findIndex(e=>e.id===editTargetId);if(idx===-1)return;
  events[idx]={...events[idx],category:editCategory,title,
    artist:document.getElementById('edit-artist').value.trim(),
    venue:document.getElementById('edit-venue').value.trim(),
    ticketDate:document.getElementById('edit-ticket-date').value,
    eventDate:document.getElementById('edit-event-date').value,
    ticketSite:editSite,
    ticketUrl:document.getElementById('edit-ticket-url').value.trim(),
    memo:document.getElementById('edit-memo').value.trim(),
    departure:document.getElementById('edit-departure').value.trim(),
  };
  sortEvents();persist();renderAll();closeEditModal();showToast('✅ 更新しました！','success');
}

// DELETE
function confirmDelete(id){
  deleteTargetId=id;
  const ev=events.find(e=>e.id===id);
  document.getElementById('confirm-target-name').textContent=ev?`「${ev.title}」を削除します`:'削除すると元に戻せません';
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){deleteTargetId=null;document.getElementById('confirm-overlay').classList.remove('open');}
function execDelete(){events=events.filter(e=>e.id!==deleteTargetId);persist();renderAll();closeConfirm();showToast('🗑️ 削除しました','success');}

// BUDGET
function editBudget(){
  const card=document.getElementById('budget-card');
  const current=document.getElementById('stat-budget').textContent.replace(/[¥,]/g,'');
  card.innerHTML=`<input class="budget-input" id="budget-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${current}" autocomplete="off" autocorrect="off" spellcheck="false"><div class="stat-label">入力後、外をタップで確定</div>`;
  const inp=document.getElementById('budget-input');inp.focus();
  setTimeout(()=>inp.select(),50);
  let saved=false;
  function saveBudget(){
    if(saved)return;saved=true;
    const val=parseInt(inp.value.replace(/[^0-9]/g,''))||0;
    const fmt='¥'+val.toLocaleString('ja-JP');
    try{localStorage.setItem('ev_budget',String(val));}catch(e){}
    card.innerHTML=`<div class="stat-num purple" id="stat-budget">${fmt}</div><div class="stat-label">今月の推し活予算 ✏️</div>`;
    card.onclick=editBudget;
  }
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveBudget();}});
  inp.addEventListener('blur',saveBudget);
}
function loadBudget(){
  try{const v=localStorage.getItem('ev_budget');if(v){document.getElementById('stat-budget').textContent='¥'+parseInt(v).toLocaleString('ja-JP');}}catch(e){}
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type}`;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>t.classList.remove('show'),2800);
}

try{const old=localStorage.getItem('wota_events');if(old&&!localStorage.getItem('ev_events')){localStorage.setItem('ev_events',old);}}catch(e){}
loadFromStorage();
loadBudget();
switchView('list',document.querySelector('.view-tab'));
